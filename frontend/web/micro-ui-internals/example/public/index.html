<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="https://egov-dev-assets.s3.ap-south-1.amazonaws.com/browser-icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
      rel="stylesheet"
      type="text/css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#eef7f6" />
    <title>DIGIT</title>
    <!-- Tailwind CSS CDN - Updated to latest version -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Configuration -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'djibouti-primary': '#22a4d9',
              'djibouti-primary-light': 'rgba(34, 164, 217, 0.1)',
              'djibouti-primary-dark': '#1978a0',

              'djibouti-secondary': '#52ac47',
              'djibouti-secondary-light': 'rgba(82, 172, 71, 0.1)',
              'djibouti-secondary-dark': '#3a7d34',

              'djibouti-sage': '#3f8c7a', // mix équilibré entre primary & secondary

              // Aliases
              'primary': '#22a4d9',
              'primary-light': 'rgba(34, 164, 217, 0.1)',
              'primary-dark': '#1978a0',

              'secondary': '#52ac47',
              'secondary-light': 'rgba(82, 172, 71, 0.1)',
              'secondary-dark': '#3a7d34',

              'sage': '#3f8c7a',
            }
          }
        }
      }
    </script>

    <!-- Djibouti Design System -->
    <style>
      /* Set Inter as the main font family */
      * {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        background-color: rgba(26, 154, 141, 0.06);
      }
      
      :root {
        --color-djibouti-primary: #22a4d9;
        --color-djibouti-primary-light: #22a4d94a;
        --color-djibouti-primary-dark: #1978a0;
        --color-djibouti-secondary: #52ac47;
        --color-djibouti-sage: #52ac47;
      }

      
      *,:before,:after {
        box-sizing: border-box;
        border-width: 0;
        border-style: solid;
        border-color: #e5e7eb;
    }
    
    :before,:after {
        --tw-content: ""
    }

      
      /* Djibouti Brand Colors */
      .bg-djibouti-primary {
        background-color: #22a4d9 !important;
      }
      .bg-djibouti-primary-light {
        background-color: rgba(0, 103, 105, 0.1) !important;
      }
      .bg-djibouti-primary-dark {
        background-color: #1978a0 !important;
      }
      .bg-djibouti-secondary {
        background-color: #52ac47 !important;
      }
      .bg-djibouti-sage {
        background-color: #52ac47 !important;
      }
      
      /* Primary color aliases */
      .bg-primary { background-color: #22a4d9 !important; }
      .bg-primary-light { background-color: rgba(0, 103, 105, 0.1) !important; }
      .bg-primary-dark { background-color: #1978a0 !important; }
      .bg-secondary { background-color: #52ac47 !important; }
      .bg-sage { background-color: #52ac47 !important; }

      .text-djibouti-primary {
        color: #22a4d9 !important;
      }
      .text-djibouti-primary-light {
        color: #b3d9da !important;
      }
      .text-djibouti-primary-dark {
        color: #1978a0 !important;
      }
      .text-djibouti-secondary {
        color: #52ac47 !important;
      }
      .text-djibouti-sage {
        color: #52ac47 !important;
      }
      
      /* Primary text color aliases */
      .text-primary { color: #22a4d9 !important; }
      .text-primary-light { color: #b3d9da !important; }
      .text-primary-dark { color: #1978a0 !important; }
      .text-secondary { color: #52ac47 !important; }
      .text-sage { color: #52ac47 !important; }

      .border-djibouti-primary {
        border-color: #22a4d9 !important;
      }
      .border-djibouti-secondary {
        border-color: #52ac47 !important;
      }
      .border-djibouti-sage {
        border-color: #52ac47 !important;
      }

      /* Hover states */
      .hover\:bg-djibouti-primary:hover {
        background-color: #22a4d9 !important;
      }
      .hover\:bg-djibouti-primary-light:hover {
        background-color: rgba(0, 103, 105, 0.1) !important;
      }
      .hover\:bg-djibouti-primary-dark:hover {
        background-color: #1978a0 !important;
      }
      .hover\:bg-djibouti-secondary:hover {
        background-color: #52ac47 !important;
      }
      .hover\:bg-djibouti-sage:hover {
        background-color: #52ac47 !important;
      }

      /* Focus states */
      .focus\:border-djibouti-primary:focus {
        border-color: #22a4d9 !important;
      }
      .focus\:ring-djibouti-primary:focus {
        --tw-ring-color: #22a4d9 !important;
        box-shadow: 0 0 0 3px rgba(0, 103, 105, 0.1) !important;
      }
      
      /* Gradients */
      .bg-gradient-to-r.from-djibouti-primary.to-djibouti-secondary {
        background: linear-gradient(to right, #22a4d9, #22a4d9) !important;
      }
      .bg-gradient-to-br.from-djibouti-primary\/95.to-djibouti-secondary\/95 {
        background: linear-gradient(to bottom right, rgba(0, 103, 105, 0.95), rgba(205, 210, 62, 0.95)) !important;
      }
      
              /* Primary gradient aliases */
        .bg-gradient-to-r.from-primary.to-primary-dark {
          background: linear-gradient(to right, #22a4d9, #1978a0) !important;
        }
        .bg-gradient-to-r.from-primary.to-secondary {
          background: linear-gradient(to right, #22a4d9, #22a4d9) !important;
        }
        
        /* Text gradient support */
        .bg-gradient-to-r.from-primary.to-primary-dark.bg-clip-text {
          background: linear-gradient(to right, #22a4d9, #1978a0) !important;
          -webkit-background-clip: text !important;
          background-clip: text !important;
          -webkit-text-fill-color: transparent !important;
          color: transparent !important;
        }

      /* Gradient backgrounds */
      .bg-gradient-djibouti {
        background: linear-gradient(90deg, #22a4d9 0%, #22a4d9 100%) !important;
      }

      .bg-opacity-20 {
        background-color: rgb(255 255 255 / 30%) !important;
      }

      .bg-gradient-djibouti-light {
        background: linear-gradient(90deg, #22a4d9 0%, #22a4d9 100%) !important;
      }

      /* Custom utilities */
      .shadow-djibouti {
        box-shadow: 0 4px 15px rgba(0, 103, 105, 0.2) !important;
      }
      .card-djibouti {
        background: white !important;
        border-radius: 12px !important;
        box-shadow: 0 4px 15px rgba(0, 103, 105, 0.1) !important;
        border: 1px solid rgba(0, 103, 105, 0.1) !important;
      }

      /* CUstom components override */
      .digit-stepper-container   {
        margin-top: 0 !important;
      }
      
    </style>
