name: Deploy on eks
on:
  push:
    branches:
      - djibouti-frontend
jobs:
  deploy_on_eks:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Stack 
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /home/ubuntu/phase2/digit-studio
            ./deploy.sh
