name: Build and Deploy Digit Studio

on:
  push:
    branches:
      - djibouti-ps-staging

env:
  DOCKER_REPO: ttpldevops/public-service
  REMOTE_DEPLOY_SCRIPT: /home/ubuntu/deploy-digit.sh

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Docker image tag
        id: vars
        run: echo "TAG=latest-$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_REPO:$TAG ./studio-services/public-service

      - name: Push Docker image
        run: |
          docker push $DOCKER_REPO:$TAG

      - name: SSH to Bastion and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST_ST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY_ST }}
          script: |
            set -e
            cd /home/ubuntu/phase3/DIGIT-DevOps/deploy-as-code/helm/charts/studio-services/public-service

            # Update only the top-level image tag, not the initContainers
            sed -i '/^image:$/,/^[^ ]/s/^  tag: .*/  tag: "${{ env.TAG }}"/' values.yaml

            cd ../../environments/

            helm upgrade -i public-service ../studio-services/public-service/ \
              -n egov -f env.yaml -f env-secrets.yaml
